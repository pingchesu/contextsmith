<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="420" viewBox="0 0 1160 420" role="img" aria-labelledby="title desc">
  <title id="title">SourceBrief context flow</title>
  <desc id="desc">Repos, docs, and runbooks are indexed into versioned evidence, reviewed into context packs, and served to agents through API and MCP.</desc>
  <defs>
    <style>
      .bg { fill: #f7f0e6; }
      .panel { fill: #fffaf2; stroke: #2f2a24; stroke-width: 2; }
      .panel2 { fill: #ede3d3; stroke: #2f2a24; stroke-width: 2; }
      .text { fill: #2f2a24; font: 600 24px 'IBM Plex Sans', Arial, sans-serif; }
      .small { fill: #4e463c; font: 16px 'IBM Plex Sans', Arial, sans-serif; }
      .mono { fill: #2f2a24; font: 15px 'IBM Plex Mono', monospace; }
      .arrow { stroke: #2f2a24; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .accent { fill: #d7ff64; stroke: #2f2a24; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#2f2a24"/>
    </marker>
  </defs>
  <rect class="bg" width="1160" height="420"/>

  <rect class="panel" x="40" y="70" width="220" height="230" rx="14"/>
  <text class="text" x="70" y="115">Sources</text>
  <text class="small" x="70" y="155">Git repositories</text>
  <text class="small" x="70" y="185">Docs and runbooks</text>
  <text class="small" x="70" y="215">Uploaded folders</text>
  <text class="mono" x="70" y="260">commit / hash / path</text>

  <path class="arrow" d="M270 185 L360 185"/>

  <rect class="panel2" x="370" y="45" width="280" height="280" rx="14"/>
  <text class="text" x="405" y="95">Evidence layer</text>
  <rect class="accent" x="405" y="125" width="205" height="36" rx="8"/>
  <text class="mono" x="423" y="149">Resource Maps</text>
  <rect class="panel" x="405" y="178" width="205" height="36" rx="8"/>
  <text class="mono" x="423" y="202">Graphs + symbols</text>
  <rect class="panel" x="405" y="231" width="205" height="36" rx="8"/>
  <text class="mono" x="423" y="255">Context Packs</text>
  <text class="small" x="405" y="302">reviewed, pinned, cited</text>

  <path class="arrow" d="M660 185 L750 185"/>

  <rect class="panel" x="760" y="70" width="160" height="230" rx="14"/>
  <text class="text" x="790" y="115">Runtime</text>
  <text class="small" x="790" y="155">HTTP API</text>
  <text class="small" x="790" y="185">MCP tools</text>
  <text class="small" x="790" y="215">Skill Packs</text>
  <text class="mono" x="790" y="260">scoped access</text>

  <path class="arrow" d="M930 185 L1020 185"/>

  <rect class="panel" x="1030" y="70" width="90" height="230" rx="14"/>
  <text class="text" x="1050" y="115">Agents</text>
  <text class="small" x="1050" y="155">Claude</text>
  <text class="small" x="1050" y="185">Codex</text>
  <text class="small" x="1050" y="215">Hermes</text>
  <text class="small" x="1050" y="245">Cursor</text>

  <text class="text" x="40" y="365">Agents get evidence instead of guesses.</text>
  <text class="small" x="40" y="392">Every useful answer should trace back to the source version, file, line, or document it came from.</text>
</svg>
